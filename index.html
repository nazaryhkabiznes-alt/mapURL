<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRO Виброметр</title>
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-main: #ffffff;
            --text-muted: #aaaaaa;
            --accent: #00f2fe;
            --danger: #ff4b4b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            min-height: 100vh;
        }

        header {
            margin-bottom: 20px;
            text-align: center;
        }

        header h1 {
            font-size: 1.5rem;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .dashboard {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            width: 100%;
            max-width: 600px;
            margin-bottom: 20px;
        }

        .card {
            background-color: var(--card-bg);
            padding: 15px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .card h3 {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-bottom: 5px;
        }

        .card .value {
            font-size: 1.4rem;
            font-weight: bold;
            font-variant-numeric: tabular-nums;
        }

        .magnitude-card {
            grid-column: span 3;
            background: linear-gradient(145deg, #1e1e1e, #2a2a2a);
            border-left: 4px solid var(--accent);
        }

        .magnitude-card .value {
            font-size: 2.5rem;
            color: var(--accent);
        }

        canvas {
            width: 100%;
            max-width: 600px;
            height: 200px;
            background-color: var(--card-bg);
            border-radius: 12px;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        button {
            background: linear-gradient(45deg, #4facfe, #00f2fe);
            color: #000;
            border: none;
            padding: 15px 40px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        button:active {
            transform: scale(0.95);
        }

        button.stop {
            background: linear-gradient(45deg, #ff0844, #ffb199);
            color: white;
        }

        #status {
            margin-top: 15px;
            font-size: 0.9rem;
            color: var(--text-muted);
        }
    </style>
</head>
<body>

    <header>
        <h1>Виброметр</h1>
    </header>

    <div class="dashboard">
        <div class="card magnitude-card">
            <h3>Общая магнитуда (m/s²)</h3>
            <div class="value" id="valTotal">0.00</div>
        </div>
        <div class="card">
            <h3>Ось X</h3>
            <div class="value" id="valX">0.00</div>
        </div>
        <div class="card">
            <h3>Ось Y</h3>
            <div class="value" id="valY">0.00</div>
        </div>
        <div class="card">
            <h3>Ось Z</h3>
            <div class="value" id="valZ">0.00</div>
        </div>
    </div>

    <canvas id="graphCanvas"></canvas>

    <button id="toggleBtn">Начать измерения</button>
    <div id="status">Датчик неактивен. Нажмите кнопку.</div>

    <script>
        let isMeasuring = false;
        let graphData = new Array(100).fill(0); // Массив для графика
        
        // DOM Элементы
        const valX = document.getElementById('valX');
        const valY = document.getElementById('valY');
        const valZ = document.getElementById('valZ');
        const valTotal = document.getElementById('valTotal');
        const toggleBtn = document.getElementById('toggleBtn');
        const statusText = document.getElementById('status');
        const canvas = document.getElementById('graphCanvas');
        const ctx = canvas.getContext('2d');

        // Настройка Canvas для четкого отображения (Retina)
        function resizeCanvas() {
            canvas.width = canvas.clientWidth * window.devicePixelRatio;
            canvas.height = canvas.clientHeight * window.devicePixelRatio;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // Отрисовка графика
        function drawGraph() {
            if (!isMeasuring) return;

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Сетка
            ctx.strokeStyle = '#333';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(0, canvas.height / 2);
            ctx.lineTo(canvas.width, canvas.height / 2);
            ctx.stroke();

            // Линия графика
            ctx.strokeStyle = '#00f2fe';
            ctx.lineWidth = 3;
            ctx.beginPath();

            const sliceWidth = canvas.width / (graphData.length - 1);
            let xPos = 0;

            for (let i = 0; i < graphData.length; i++) {
                // Масштабируем значение (макс 30 m/s^2 для видимости)
                let yVal = graphData[i];
                let normalizedY = (yVal / 30) * (canvas.height / 2);
                let yPos = canvas.height - (normalizedY + 10); // Отступ снизу

                if (i === 0) {
                    ctx.moveTo(xPos, yPos);
                } else {
                    ctx.lineTo(xPos, yPos);
                }
                xPos += sliceWidth;
            }
            ctx.stroke();

            requestAnimationFrame(drawGraph);
        }

        // Обработка данных акселерометра
        function handleMotion(event) {
            // Пытаемся получить данные без учета гравитации (если доступно), иначе с гравитацией
            let x = event.acceleration?.x || event.accelerationIncludingGravity?.x || 0;
            let y = event.acceleration?.y || event.accelerationIncludingGravity?.y || 0;
            let z = event.acceleration?.z || event.accelerationIncludingGravity?.z || 0;

            // Если используется accelerationIncludingGravity, по оси Z будет около 9.8 в покое.
            // Для профессионального виброметра вычисляем векторную сумму (магнитуду)
            let magnitude = Math.sqrt(x*x + y*y + z*z);

            // Обновляем текст
            valX.textContent = x.toFixed(2);
            valY.textContent = y.toFixed(2);
            valZ.textContent = z.toFixed(2);
            valTotal.textContent = magnitude.toFixed(2);

            // Обновляем данные для графика
            graphData.push(magnitude);
            graphData.shift(); // Удаляем самый старый элемент, сохраняя длину массива
        }

        // Управление запуском/остановкой
        async function toggleMeasurement() {
            if (isMeasuring) {
                // Остановка
                window.removeEventListener('devicemotion', handleMotion);
                isMeasuring = false;
                toggleBtn.textContent = 'Начать измерения';
                toggleBtn.classList.remove('stop');
                statusText.textContent = 'Измерение остановлено.';
            } else {
                // Запрос разрешений (обязательно для iOS 13+)
                if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function') {
                    try {
                        const permissionState = await DeviceMotionEvent.requestPermission();
                        if (permissionState === 'granted') {
                            startSensors();
                        } else {
                            statusText.textContent = 'Ошибка: Доступ к датчикам отклонен.';
                        }
                    } catch (error) {
                        console.error(error);
                        statusText.textContent = 'Ошибка запроса прав доступа.';
                    }
                } else {
                    // Для Android и старых iOS
                    startSensors();
                }
            }
        }

        function startSensors() {
            window.addEventListener('devicemotion', handleMotion);
            isMeasuring = true;
            toggleBtn.textContent = 'Остановить';
            toggleBtn.classList.add('stop');
            statusText.textContent = 'Сбор данных активен...';
            graphData.fill(0); // Сбрасываем график
            drawGraph();
        }

        toggleBtn.addEventListener('click', toggleMeasurement);
    </script>
</body>
</html>
